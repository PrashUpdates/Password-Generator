<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <div class="card">
    <div class="dots">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>

    <h1>Password Generator</h1>

    <div class="password-box">
      <span id="passwordText">Click generate</span>
      <button id="copyBtn" title="Copy to clipboard">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
    </div>
    <p id="copyMsg" class="copy-msg"></p>

    <div class="length-row">
      <label for="length">Length: <span id="lengthLabel">16</span></label>
      <input type="range" id="length" min="4" max="32" value="16">
    </div>

    <div class="toggle-row">
      <span>Include Uppercase</span>
      <label class="switch">
        <input type="checkbox" id="uppercase" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span>Include Lowercase</span>
      <label class="switch">
        <input type="checkbox" id="lowercase" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span>Include Numbers</span>
      <label class="switch">
        <input type="checkbox" id="numbers" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="toggle-row">
      <span>Include Symbols</span>
      <label class="switch">
        <input type="checkbox" id="symbols" checked>
        <span class="slider"></span>
      </label>
    </div>

    <div class="strength">
      <div class="strength-bar" id="strengthBar"></div>
    </div>
    <p id="strengthLabel" class="strength-label"></p>

    <button id="generateBtn" class="generate-btn">Generate Password</button>
  </div>

<script src="script.js"></script>
</body>
</html>
